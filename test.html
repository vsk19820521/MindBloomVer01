<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindBloom - Local Browser Test Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Outfit:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #121420;
      --card-bg: rgba(30, 34, 51, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f5f6fa;
      --text-muted: #a4b0be;
      --success: #4cd137;
      --error: #e84118;
      --accent: #00a8ff;
      --radius: 12px;
      --font-title: 'Fredoka', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-dark);
      background-image: radial-gradient(circle at 10% 20%, rgba(90, 80, 210, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(0, 168, 255, 0.1) 0%, transparent 45%);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-family: var(--font-title);
      font-size: 2.5rem;
      color: #fff;
      margin-bottom: 8px;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
    }

    .summary-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 30px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      display: flex;
      justify-content: space-around;
      align-items: center;
      text-align: center;
    }

    .stat {
      flex: 1;
    }

    .stat-val {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .stat.total .stat-val { color: var(--accent); }
    .stat.passed .stat-val { color: var(--success); }
    .stat.failed .stat-val { color: var(--error); }

    .test-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 30px;
    }

    .test-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 18px 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      transition: transform 0.2s, border-color 0.2s;
    }

    .test-item:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .test-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .test-title {
      font-family: var(--font-title);
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .badge.pass {
      background: rgba(76, 209, 55, 0.15);
      color: var(--success);
      border: 1px solid rgba(76, 209, 55, 0.3);
    }

    .badge.fail {
      background: rgba(232, 65, 24, 0.15);
      color: var(--error);
      border: 1px solid rgba(232, 65, 24, 0.3);
    }

    .test-details {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-muted);
      overflow-x: auto;
    }

    .assertion-line {
      display: flex;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .assertion-status {
      margin-right: 10px;
      font-weight: bold;
    }

    .assertion-status.ok { color: var(--success); }
    .assertion-status.err { color: var(--error); }

    .actions {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    button {
      padding: 12px 24px;
      font-family: var(--font-title);
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-run {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 15px rgba(0, 168, 255, 0.3);
    }

    .btn-run:hover {
      background: #0097e6;
      transform: translateY(-1px);
    }
    
    .bloom-text {
      font-family: 'Pacifico', cursive;
      font-weight: normal;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Mind<span class="bloom-text">Bloom</span> 🌸 <span>Test Runner</span></h1>
      <p class="subtitle">Self-contained browser verification harness</p>
    </header>

    <div class="summary-card">
      <div class="stat total">
        <div class="stat-val" id="total-stat">0</div>
        <div class="stat-label">Total Tests</div>
      </div>
      <div class="stat passed">
        <div class="stat-val" id="passed-stat">0</div>
        <div class="stat-label">Passed</div>
      </div>
      <div class="stat failed">
        <div class="stat-val" id="failed-stat">0</div>
        <div class="stat-label">Failed</div>
      </div>
    </div>

    <div class="test-list" id="test-list-container">
      <!-- Dynamic test runner inserts items here -->
    </div>

    <div class="actions">
      <button class="btn-run" id="btn-rerun">Run Tests Again 🔄</button>
    </div>
  </div>

  <script type="module">
    import { StorageService } from "./logic/storage.js";

    let testResults = [];

    // Helper assertions
    function assert(cond, desc) {
      if (!cond) throw new Error(desc);
      return { ok: true, desc };
    }

    function assertEquals(actual, expected, desc) {
      if (actual !== expected) {
        throw new Error(`${desc} (Expected: "${expected}", Got: "${actual}")`);
      }
      return { ok: true, desc };
    }

    // Clean test database records
    async function cleanupTestUsers() {
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const key = localStorage.key(i);
        if (key && key.startsWith("mindbloom_user___test_")) {
          localStorage.removeItem(key);
        }
      }
      try {
        await fetch("/api/delete-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: "__test_emma" })
        });
        await fetch("/api/delete-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: "__test_sophia" })
        });
      } catch (e) {
        console.warn("Failed to clean up test user on server:", e);
      }
    }

    async function runTestSuite() {
      await cleanupTestUsers();
      testResults = [];
      document.getElementById("test-list-container").innerHTML = "";
      
      // 1. DATABASE INTEGRITY
      await runTest("JSON Puzzles Database Integrity", async (log) => {
        const response = await fetch("data/puzzles.json?v=" + Date.now());
        const puzzles = await response.json();

        log(assert(Array.isArray(puzzles), "Puzzles loads as an array"));
        log(assertEquals(puzzles.length, 75, "Puzzles database has exactly 75 puzzles (15 days * 5 puzzles/day)"));
        
        // Assert schema format
        const p1 = puzzles[0];
        log(assert(p1.id !== undefined, "Puzzles have an id property"));
        log(assert(p1.day !== undefined, "Puzzles have a day property"));
        log(assert(p1.number !== undefined, "Puzzles have a number property"));
        log(assert(p1.title !== undefined, "Puzzles have a title property"));
        log(assert(p1.category !== undefined, "Puzzles have a category property"));
        log(assert(p1.difficulty !== undefined, "Puzzles have a difficulty property"));
        log(assert(p1.coinsReward !== undefined, "Puzzles have a coinsReward property"));
        log(assert(p1.question !== undefined, "Puzzles have a question property"));
        log(assert(p1.type !== undefined, "Puzzles have a type property"));
        log(assert(p1.correctAnswer !== undefined, "Puzzles have a correctAnswer property"));
      });

      // 2. REGISTRATION
      await runTest("Parent Registration & Child Profile Schema", async (log) => {
        const parentData = { email: "parent@test.com", phone: "+1234567890", code: "1234" };
        const childData = {
          firstName: "Emma",
          lastName: "Watson",
          gender: "Female",
          age: 9,
          avatar: "⚡ Pikachu",
          livingCountry: "United Kingdom",
          culturalAffiliation: "India"
        };
        const credentials = { username: "__test_emma", password: "password123" };

        const regRes = await StorageService.registerUser(parentData, childData, credentials);
        log(assertEquals(regRes.success, true, "Registration returns success = true"));

        // Verify lookup isolated
        const storedKey = "mindbloom_user___test_emma";
        const storedData = localStorage.getItem(storedKey);
        log(assert(storedData !== null, "User entry stored under key 'mindbloom_user___test_emma'"));
        
        const userObj = JSON.parse(storedData);
        log(assertEquals(userObj.childFirstName, "Emma", "Stored child first name matches"));
        log(assertEquals(userObj.childLastName, "Watson", "Stored child last name matches"));
        log(assertEquals(userObj.parentCode, "1234", "Stored parent secret PIN code matches"));
        log(assertEquals(userObj.livingCountry, "United Kingdom", "Stored country is verified"));
        log(assertEquals(userObj.culturalAffiliation, "India", "Stored cultural identity is verified"));
        log(assertEquals(userObj.gameState.coins, 0, "Initial coins are set to 0"));

        // Duplicate checks
        const duplicateRes = await StorageService.registerUser(parentData, childData, credentials);
        log(assertEquals(duplicateRes.success, false, "Registering duplicate username is blocked"));
      });

      // 3. AUTHENTICATION
      await runTest("Authentication & Session Handling", async (log) => {
        const loginFail = await StorageService.loginUser("__test_emma", "wrongpass");
        log(assertEquals(loginFail.success, false, "Login fails with incorrect password"));

        const loginOk = await StorageService.loginUser("__test_emma", "password123");
        log(assertEquals(loginOk.success, true, "Login succeeds with correct password"));
        log(assertEquals(loginOk.user.childFirstName, "Emma", "Log in session returns profile name"));
        
        const activeUser = StorageService.getCurrentUser();
        log(assert(activeUser !== null, "Active session exists"));
        log(assertEquals(activeUser.username, "__test_emma", "Active user username matches"));
        log(assertEquals(activeUser.parentCode, "1234", "Active user parentCode is correctly loaded"));

        // Verify Parent PIN Gate checking
        log(assertEquals(StorageService.verifyParentGate("1234", activeUser.parentCode), true, "Parent Gate PIN verification passes with correct PIN"));
        log(assertEquals(StorageService.verifyParentGate("9999", activeUser.parentCode), false, "Parent Gate PIN verification fails with incorrect PIN"));
        log(assertEquals(StorageService.verifyParentGate("0012", "0012"), true, "Parent Gate PIN handles leading zeros correctly"));
      });

      // 4. GAMEPLAY PROGRESS & LOCKS
      await runTest("Gameplay & Sequence Locking Logic", async (log) => {
        // Assert we start day 1 puzzle 1
        const user = StorageService.getCurrentUser();
        log(assertEquals(user.gameState.currentDay, 1, "Game starts on Day 1"));
        log(assertEquals(user.gameState.unlockedUpToDay, 1, "Unlocked up to Day 1 initially"));

        // Mock puzzle completion
        // Day 1 Puzzle 1 is MC: "Blue, Yellow, Red", rewards 10 coins
        user.gameState.completedPuzzles["d1_q1"] = {
          answered: true,
          correct: true,
          userAnswer: "Blue, Yellow, Red",
          coinsAwarded: 10
        };
        user.gameState.coins += 10;
        await StorageService.updateGameState(user.gameState);

        const updatedUser = StorageService.getCurrentUser();
        log(assertEquals(updatedUser.gameState.coins, 10, "Coins count updated to 10"));
        log(assert(updatedUser.gameState.completedPuzzles["d1_q1"].answered, "d1_q1 marked completed in state"));
      });

      // 5. STAGE LEVEL MATHEMATICS
      await runTest("Coins Accumulation & Stage Level Progression", async (log) => {
        const user = StorageService.getCurrentUser();
        
        // Assert Level 1 initially (0 coins)
        log(assertEquals(user.gameState.level, 1, "Initial level starts at 1"));
        
        // Level up thresholds: Level 2 = 150 coins, Level 3 = 400 coins
        user.gameState.coins = 160;
        await StorageService.updateGameState(user.gameState);
        
        // Trigger calculation (usually triggers in renderHeader in UI, we mock levels update here)
        const totalCoins = user.gameState.coins;
        const STAGE_LEVELS = [
          { name: "Mind Bloom", minCoins: 0 },
          { name: "Brain Bunny", minCoins: 150 },
          { name: "Puzzle Planet", minCoins: 400 }
        ];
        let calculatedLevel = 1;
        for (let i = STAGE_LEVELS.length - 1; i >= 0; i--) {
          if (totalCoins >= STAGE_LEVELS[i].minCoins) {
            calculatedLevel = i + 1;
            break;
          }
        }
        log(assertEquals(calculatedLevel, 2, "Level transitions to Level 2 (Brain Bunny) when coins >= 150"));
        
        user.gameState.coins = 420;
        await StorageService.updateGameState(user.gameState);
        
        let calculatedLevel3 = 1;
        for (let i = STAGE_LEVELS.length - 1; i >= 0; i--) {
          if (user.gameState.coins >= STAGE_LEVELS[i].minCoins) {
            calculatedLevel3 = i + 1;
            break;
          }
        }
        log(assertEquals(calculatedLevel3, 3, "Level transitions to Level 3 (Puzzle Planet) when coins >= 400"));
      });

      // 6. CONSECUTIVE DAY ANSWER LOCKS
      await runTest("Explanation / Consecutive Day Answer Locking Constraints", async (log) => {
        const puzzleDay1 = { day: 1 };
        const puzzleDay2 = { day: 2 };
        
        // Scenario A: unlockedUpToDay is Day 1. Answers for Day 1 puzzles are LOCKED.
        let unlockedUpToDay = 1;
        let isLockedA = !(unlockedUpToDay > puzzleDay1.day);
        log(assertEquals(isLockedA, true, "Day 1 puzzle solutions are locked when unlockedUpToDay is 1"));

        // Scenario B: unlockedUpToDay progresses to Day 2 (Day 1 completed). Solutions for Day 1 puzzles are UNLOCKED.
        unlockedUpToDay = 2;
        let isLockedB = !(unlockedUpToDay > puzzleDay1.day);
        log(assertEquals(isLockedB, false, "Day 1 puzzle solutions are unlocked once day progresses to Day 2"));
        
        // Scenario C: unlockedUpToDay is Day 2. Solutions for Day 2 puzzles are LOCKED.
        let isLockedC = !(unlockedUpToDay > puzzleDay2.day);
        log(assertEquals(isLockedC, true, "Day 2 puzzle solutions are locked when unlockedUpToDay is 2"));
      });

      // 7. KIDS ZONE THEME STORAGE AND PREFERENCE
      await runTest("Kids Zone Theme Preference & Storage", async (log) => {
        const username = "__test_emma";
        const testTheme = "candy";
        
        // Simulating child picking a new theme
        localStorage.setItem(`theme_${username}`, testTheme);
        const storedTheme = localStorage.getItem(`theme_${username}`);
        log(assertEquals(storedTheme, "candy", "Selected theme stores correctly in localStorage"));
        
        // Clean up theme key
        localStorage.removeItem(`theme_${username}`);
      });

      // 8. KIDS ZONE AVATAR PERSONALIZATION
      await runTest("Kids Zone Avatar Customization & Persistence", async (log) => {
        // Retrieve active user
        const user = StorageService.getCurrentUser();
        log(assert(user !== null, "User Emma is active"));

        const newAvatar = "🐶 Bluey";
        await StorageService.updateUserProfile({ childAvatar: newAvatar });

        const reloadedUser = StorageService.getCurrentUser();
        log(assertEquals(reloadedUser.childAvatar, "🐶 Bluey", "Avatar update persists correctly in localStorage profile"));
      });

      // 9. PARENT GATE OVERRIDES (DAY OVERRIDES)
      await runTest("Parent Gate Controls & Simulation Overrides", async (log) => {
        const user = StorageService.getCurrentUser();
        log(assertEquals(user.gameState.currentDay, 1, "User starts on Day 1"));

        // Simulate parent override setting day to Day 3
        const targetDay = 3;
        user.gameState.currentDay = targetDay;
        user.gameState.unlockedUpToDay = Math.max(user.gameState.unlockedUpToDay, targetDay);
        await StorageService.updateGameState(user.gameState);

        const updatedUser = StorageService.getCurrentUser();
        log(assertEquals(updatedUser.gameState.currentDay, 3, "Parent can successfully override child's active day to Day 3"));
        log(assertEquals(updatedUser.gameState.unlockedUpToDay, 3, "unlockedUpToDay moves forward with the parent override"));
      });

      // 10. CALENDAR DATES SOLVED PARSER
      await runTest("Kids Zone Calendar Completion Parser", async (log) => {
        const user = StorageService.getCurrentUser();
        
        // Mock puzzle completions on distinct dates
        user.gameState.completedPuzzles["d1_q2"] = {
          answered: true,
          correct: true,
          timeSolved: "2026-06-21"
        };
        user.gameState.completedPuzzles["d1_q3"] = {
          answered: true,
          correct: true,
          timeSolved: "2026-06-22"
        };
        user.gameState.completedPuzzles["d1_q4"] = {
          answered: true,
          correct: true,
          timeSolved: "2026-06-22"
        };
        await StorageService.updateGameState(user.gameState);

        const updatedUser = StorageService.getCurrentUser();
        
        // Parse completed dates
        const completedDates = {};
        Object.keys(updatedUser.gameState.completedPuzzles).forEach(pid => {
          const r = updatedUser.gameState.completedPuzzles[pid];
          if (r && r.answered && r.timeSolved) {
            completedDates[r.timeSolved] = (completedDates[r.timeSolved] || 0) + 1;
          }
        });

        log(assertEquals(completedDates["2026-06-21"], 1, "Parsed exactly 1 solved activity for 2026-06-21"));
        log(assertEquals(completedDates["2026-06-22"], 2, "Parsed exactly 2 solved activities for 2026-06-22"));
        log(assertEquals(completedDates["2026-06-23"] || 0, 0, "No solved activities parsed for 2026-06-23"));
      });

      // 11. PUZZLES JSON STRUCTURE CONSISTENCY
      await runTest("Database Puzzles Sequence and Consistency", async (log) => {
        const response = await fetch("data/puzzles.json?v=" + Date.now());
        const puzzles = await response.json();

        // Check 5 puzzles per day sequentially
        const maxDay = Math.max(...puzzles.map(p => p.day));
        log(assertEquals(maxDay, 15, "Puzzles database has puzzles up to Day 15"));

        for (let d = 1; d <= maxDay; d++) {
          const dayPuzzles = puzzles.filter(p => p.day === d);
          log(assertEquals(dayPuzzles.length, 5, `Day ${d} has exactly 5 puzzles`));
          
          const numbers = dayPuzzles.map(p => p.number).sort((a,b) => a-b);
          log(assertEquals(JSON.stringify(numbers), "[1,2,3,4,5]", `Day ${d} puzzle numbers are sequential [1..5]`));
        }
      });

      // 12. DAILY REVIEW AND ATTEMPT TRACKING SYSTEM
      await runTest("Daily Review and Attempt Tracking System", async (log) => {
        // Register a clean test user
        const parentData = { email: "parent2@test.com", phone: "+1234567890", code: "5678" };
        const childData = {
          firstName: "Sophia",
          lastName: "Review",
          gender: "Female",
          age: 9,
          avatar: "🐰 Bunny",
          livingCountry: "USA",
          culturalAffiliation: "US"
        };
        const credentials = { username: "__test_sophia", password: "password123" };
        await StorageService.registerUser(parentData, childData, credentials);
        
        // Login to set session
        const loginOk = await StorageService.loginUser("__test_sophia", "password123");
        log(assertEquals(loginOk.success, true, "Login succeeds for test review user"));

        const user = StorageService.getCurrentUser();
        const activePuzzleId = "d1_q1";
        
        // Log incorrect attempt manually mimicking the app.js submit logic
        const existingRecord = user.gameState.completedPuzzles[activePuzzleId] || { attempts: [] };
        const newAttempts = [...(existingRecord.attempts || [])];
        newAttempts.push({
          userAnswer: "Red, Green, Blue",
          timeAttempted: new Date().toISOString(),
          dateAttempted: "2026-06-21", // Backdated to yesterday!
          correct: false,
          secondsSpent: 12
        });

        user.gameState.completedPuzzles[activePuzzleId] = {
          answered: false,
          correct: false,
          userAnswer: "Red, Green, Blue",
          coinsAwarded: 0,
          timeSolved: "",
          needsReview: true,
          reviewed: false,
          attempts: newAttempts
        };

        await StorageService.updateGameState(user.gameState);
        
        const updatedUser = StorageService.getCurrentUser();
        const record = updatedUser.gameState.completedPuzzles[activePuzzleId];
        
        log(assert(record !== undefined, "Completed puzzle record created"));
        log(assertEquals(record.needsReview, true, "needsReview flag is true"));
        log(assertEquals(record.reviewed, false, "reviewed flag is initially false"));
        log(assertEquals(record.attempts.length, 1, "There is exactly 1 attempt logged"));
        log(assertEquals(record.attempts[0].correct, false, "The attempt is marked incorrect"));
        log(assertEquals(record.attempts[0].dateAttempted, "2026-06-21", "The attempt date is correctly preserved"));

        // Simulate a correct attempt on a subsequent day (today)
        const currentAttempts = [...(record.attempts || [])];
        currentAttempts.push({
          userAnswer: "Blue, Yellow, Red", // correct answer
          timeAttempted: new Date().toISOString(),
          dateAttempted: "2026-06-22",
          correct: true,
          secondsSpent: 8
        });

        updatedUser.gameState.completedPuzzles[activePuzzleId] = {
          answered: true,
          correct: true,
          userAnswer: "Blue, Yellow, Red",
          coinsAwarded: 10,
          timeSolved: "2026-06-22",
          needsReview: record.needsReview || false,
          reviewed: record.reviewed || false,
          attempts: currentAttempts
        };

        await StorageService.updateGameState(updatedUser.gameState);

        const finalUser = StorageService.getCurrentUser();
        const finalRecord = finalUser.gameState.completedPuzzles[activePuzzleId];

        log(assertEquals(finalRecord.answered, true, "Puzzle is now marked as answered"));
        log(assertEquals(finalRecord.correct, true, "Puzzle is marked correct"));
        log(assertEquals(finalRecord.needsReview, true, "needsReview flag remains true even after solving"));
        log(assertEquals(finalRecord.reviewed, false, "reviewed flag remains false until reviewed flow"));
        log(assertEquals(finalRecord.attempts.length, 2, "There are exactly 2 attempts logged"));
        
        // Verify review filter logic
        const today = "2026-06-22";
        const reviewQueue = [];
        Object.keys(finalUser.gameState.completedPuzzles).forEach(pid => {
          const r = finalUser.gameState.completedPuzzles[pid];
          if (r && r.needsReview && !r.reviewed) {
            const hasPrevDayIncorrect = r.attempts && r.attempts.some(attempt => {
              return !attempt.correct && attempt.dateAttempted < today;
            });
            if (hasPrevDayIncorrect) {
              reviewQueue.push(pid);
            }
          }
        });

        log(assertEquals(reviewQueue.length, 1, "Review queue correctly identifies 1 previous-day mistake puzzle"));
        log(assertEquals(reviewQueue[0], "d1_q1", "Identified puzzle in review queue is indeed d1_q1"));

        // Mark it as reviewed
        finalUser.gameState.completedPuzzles["d1_q1"].reviewed = true;
        await StorageService.updateGameState(finalUser.gameState);

        const afterReviewUser = StorageService.getCurrentUser();
        log(assertEquals(afterReviewUser.gameState.completedPuzzles["d1_q1"].reviewed, true, "Puzzle successfully marked as reviewed in DB"));

        // Assert attempt times are logged correctly
        const checkRecord = afterReviewUser.gameState.completedPuzzles["d1_q1"];
        log(assertEquals(checkRecord.attempts[0].secondsSpent, 12, "Incorrect attempt logged secondsSpent = 12"));
        log(assertEquals(checkRecord.attempts[1].secondsSpent, 8, "Correct attempt logged secondsSpent = 8"));

        // Verify calculations: sum=20, count=2. Avg=10. Success=8, count=1. Avg=8.
        let totalAttemptsCount = 0;
        let totalAttemptsSeconds = 0;
        let successAttemptsCount = 0;
        let successAttemptsSeconds = 0;

        Object.keys(afterReviewUser.gameState.completedPuzzles).forEach(pid => {
          const rec = afterReviewUser.gameState.completedPuzzles[pid];
          if (rec && rec.attempts) {
            rec.attempts.forEach(att => {
              const sec = att.secondsSpent || 10;
              totalAttemptsCount++;
              totalAttemptsSeconds += sec;
              if (att.correct === true) {
                successAttemptsCount++;
                successAttemptsSeconds += sec;
              }
            });
          }
        });

        log(assertEquals(totalAttemptsCount, 2, "Calculated exactly 2 total attempts"));
        log(assertEquals(totalAttemptsSeconds, 20, "Calculated exactly 20 total seconds"));
        log(assertEquals(successAttemptsCount, 1, "Calculated exactly 1 success attempt"));
        log(assertEquals(successAttemptsSeconds, 8, "Calculated exactly 8 successful seconds"));
      });

      // 13. STATIC SOLVE TARGET TIMES & SINGLE-ATTEMPT LIMIT
      await runTest("Static Solve Target Times & Single-Attempt Limit", async (log) => {
        // Register a test child user
        const parentData = { email: "parent3@test.com", phone: "+1234567890", code: "7890" };
        const childData = {
          firstName: "Alex",
          lastName: "Speed",
          gender: "Male",
          age: 10,
          avatar: "⚡ Pikachu",
          livingCountry: "USA",
          culturalAffiliation: "US"
        };
        const credentials = { username: "__test_alex", password: "password123" };
        await StorageService.registerUser(parentData, childData, credentials);
        await StorageService.loginUser("__test_alex", "password123");
        
        const user = StorageService.getCurrentUser();
        
        // 13.1 Verify static target times based on difficulty
        const getTargetTime = (diff) => diff === "Easy" ? 20 : (diff === "Medium" ? 30 : 40);
        log(assertEquals(getTargetTime("Easy"), 20, "Static target time for Easy is 20s"));
        log(assertEquals(getTargetTime("Medium"), 30, "Static target time for Medium is 30s"));
        log(assertEquals(getTargetTime("Hard"), 40, "Static target time for Hard is 40s"));

        // 13.2 Verify speed bonus calculation for Medium difficulty (threshold = 30s)
        const puzzleMedium = { id: "d1_q2", difficulty: "Medium", coinsReward: 20 };
        
        // Case A: solved in 25s (< 30s) -> Speed bonus earned!
        const timeSpentA = 25;
        const isSpeedBonusA = (timeSpentA < getTargetTime(puzzleMedium.difficulty));
        log(assertEquals(isSpeedBonusA, true, "Solved in 25s qualifies for speed bonus (Medium threshold = 30s)"));
        
        const bonusCoinsA = isSpeedBonusA ? 2 : 0;
        const recordA = {
          answered: true,
          correct: true,
          userAnswer: "One kitten took the basket with the last ball of yarn inside",
          coinsAwarded: puzzleMedium.coinsReward + bonusCoinsA,
          speedBonusAwarded: isSpeedBonusA,
          timeSolved: "2026-06-23",
          attempts: [{
            userAnswer: "One kitten took the basket with the last ball of yarn inside",
            timeAttempted: new Date().toISOString(),
            dateAttempted: "2026-06-23",
            correct: true,
            secondsSpent: timeSpentA
          }]
        };
        user.gameState.completedPuzzles[puzzleMedium.id] = recordA;
        user.gameState.coins += recordA.coinsAwarded;
        await StorageService.updateGameState(user.gameState);
        
        const updatedUser = StorageService.getCurrentUser();
        const storedRecordA = updatedUser.gameState.completedPuzzles[puzzleMedium.id];
        log(assertEquals(storedRecordA.coinsAwarded, 22, "Awarded 22 coins (20 base + 2 bonus) for beating target time"));
        log(assertEquals(storedRecordA.speedBonusAwarded, true, "speedBonusAwarded flag is true"));
        log(assertEquals(updatedUser.gameState.coins, 22, "Coins successfully added to user gameState"));

        // 13.3 Verify single-attempt constraint for incorrect submissions
        const puzzleEasy = { id: "d1_q1", difficulty: "Easy", coinsReward: 10 };
        
        // Simulating incorrect submission: set answered: true, correct: false, coins: 0
        const recordB = {
          answered: true,
          correct: false,
          userAnswer: "Yellow, Red, Blue", // incorrect answer
          coinsAwarded: 0,
          timeSolved: "",
          needsReview: true,
          reviewed: false,
          attempts: [{
            userAnswer: "Yellow, Red, Blue",
            timeAttempted: new Date().toISOString(),
            dateAttempted: "2026-06-23",
            correct: false,
            secondsSpent: 15
          }]
        };
        
        updatedUser.gameState.completedPuzzles[puzzleEasy.id] = recordB;
        await StorageService.updateGameState(updatedUser.gameState);
        
        const finalUser = StorageService.getCurrentUser();
        const storedRecordB = finalUser.gameState.completedPuzzles[puzzleEasy.id];
        log(assertEquals(storedRecordB.answered, true, "Incorrect attempt marks puzzle as answered (locks it)"));
        log(assertEquals(storedRecordB.correct, false, "Incorrect attempt marks puzzle as correct: false"));
        log(assertEquals(storedRecordB.coinsAwarded, 0, "Incorrect attempt awards 0 coins"));
        log(assertEquals(storedRecordB.needsReview, true, "Incorrect attempt sets needsReview to true for tomorrow's review"));
        
        // Clean up test user
        await fetch("/api/delete-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: "__test_alex" })
        });
      });

      updateStats();
      await cleanupTestUsers();
    }

    async function runTest(name, testFn) {
      const item = document.createElement("div");
      item.className = "test-item";
      
      const header = document.createElement("div");
      header.className = "test-header";
      
      const titleSpan = document.createElement("span");
      titleSpan.className = "test-title";
      titleSpan.innerText = name;
      
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.innerText = "Running...";
      
      header.appendChild(titleSpan);
      header.appendChild(badge);
      item.appendChild(header);
      
      const details = document.createElement("div");
      details.className = "test-details";
      item.appendChild(details);
      
      document.getElementById("test-list-container").appendChild(item);
      
      const logs = [];
      const logWriter = (res) => {
        logs.push(res);
        const div = document.createElement("div");
        div.className = "assertion-line";
        div.innerHTML = `
          <span class="assertion-status ${res.ok ? 'ok' : 'err'}">${res.ok ? '✓' : '✗'}</span>
          <span>${res.desc}</span>
        `;
        details.appendChild(div);
      };

      try {
        await testFn(logWriter);
        badge.innerText = "Pass";
        badge.classList.add("pass");
        testResults.push({ name, status: "PASS", logs });
      } catch (err) {
        badge.innerText = "Fail";
        badge.classList.add("fail");
        
        const div = document.createElement("div");
        div.className = "assertion-line";
        div.innerHTML = `
          <span class="assertion-status err">✗ Failure:</span>
          <span style="color:var(--error); font-weight:bold;">${err.message}</span>
        `;
        details.appendChild(div);
        
        testResults.push({ name, status: "FAIL", logs, error: err.message });
      }
    }

    function updateStats() {
      const total = testResults.length;
      const passed = testResults.filter(r => r.status === "PASS").length;
      const failed = total - passed;
      
      document.getElementById("total-stat").innerText = total;
      document.getElementById("passed-stat").innerText = passed;
      document.getElementById("failed-stat").innerText = failed;
    }

    document.getElementById("btn-rerun").addEventListener("click", runTestSuite);

    // Initial run
    runTestSuite();
  </script>
